services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - influxdb
    restart: unless-stopped

  influxdb:
    image: influxdb:3-core
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb3
    environment:
      INFLUXDB3_NODE_IDENTIFIER_PREFIX: updown
    restart: unless-stopped

volumes:
  influxdb_data:
